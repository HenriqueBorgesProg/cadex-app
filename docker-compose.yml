services:
  postgres:
    image: postgres:16-alpine
    container_name: cadex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cadex
      POSTGRES_PASSWORD: cadex
      POSTGRES_DB: cadex_network
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cadex-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cadex
      DB_PASSWORD: cadex
      DB_NAME: cadex_network
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cadex-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
